name: Build Desktop App

on:
  # Build on push to main with tags, or manual trigger
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.0)'
        required: false
        default: 'dev'

permissions:
  contents: write  # needed to create releases

jobs:
  # ============================================================
  # macOS Apple Silicon (.app)
  # ============================================================
  build-macos-arm64:
    runs-on: macos-14  # Apple Silicon (M1/M2) runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject version from git tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version || 'dev' }}"
          fi
          echo "__version__ = \"${VERSION}\"" > version.py
          echo "Version set to: ${VERSION}"
          cat version.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller SET-Financial-Analyzer.spec

      - name: Create ZIP archive
        run: |
          cd dist
          zip -r ../SET-Financial-Analyzer-macOS-arm64.zip SET-Financial-Analyzer.app
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SET-Financial-Analyzer-macOS-arm64
          path: SET-Financial-Analyzer-macOS-arm64.zip
          retention-days: 30

  # ============================================================
  # macOS Intel (.app)
  # ============================================================
  build-macos-x64:
    runs-on: macos-15-intel  # Intel runner (macos-13 deprecated)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject version from git tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version || 'dev' }}"
          fi
          echo "__version__ = \"${VERSION}\"" > version.py
          echo "Version set to: ${VERSION}"
          cat version.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller SET-Financial-Analyzer.spec

      - name: Create ZIP archive
        run: |
          cd dist
          zip -r ../SET-Financial-Analyzer-macOS-x64.zip SET-Financial-Analyzer.app
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SET-Financial-Analyzer-macOS-x64
          path: SET-Financial-Analyzer-macOS-x64.zip
          retention-days: 30

  # ============================================================
  # Windows (.exe)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject version from git tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version || 'dev' }}"
          fi
          echo "__version__ = \"${VERSION}\"" > version.py
          echo "Version set to: ${VERSION}"
          cat version.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller SET-Financial-Analyzer.spec

      - name: Create ZIP archive
        run: Compress-Archive -Path dist\SET-Financial-Analyzer.exe -DestinationPath SET-Financial-Analyzer-Windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SET-Financial-Analyzer-Windows-x64
          path: SET-Financial-Analyzer-Windows-x64.zip
          retention-days: 30

  # ============================================================
  # Create GitHub Release (only on tag push)
  # ============================================================
  release:
    needs: [build-macos-arm64, build-macos-x64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SET Financial Analyzer ${{ github.ref_name }}"
          body: |
            ## SET Financial Analyzer ${{ github.ref_name }}

            ### ดาวน์โหลด
            | ระบบปฏิบัติการ | ไฟล์ |
            |---|---|
            | macOS (Apple Silicon M1/M2/M3/M4) | `SET-Financial-Analyzer-macOS-arm64.zip` |
            | macOS (Intel) | `SET-Financial-Analyzer-macOS-x64.zip` |
            | Windows | `SET-Financial-Analyzer-Windows-x64.zip` |

            ### วิธีใช้งาน

            #### macOS
            1. ดาวน์โหลดไฟล์ ZIP ตามรุ่น Mac ของคุณ
            2. แตกไฟล์ ZIP (ดับเบิลคลิก)
            3. **ก่อนเปิดครั้งแรก** macOS จะบล็อกเพราะแอปไม่ได้มาจาก App Store ให้ทำตามนี้:
               - **คลิกขวา** (หรือ Control+คลิก) ที่ `SET-Financial-Analyzer.app` แล้วเลือก **"Open"** (เปิด)
               - จะมีหน้าต่างแจ้งเตือนขึ้นมา ให้กด **"Open"** (เปิด) อีกครั้ง
               - หากไม่มีปุ่ม "Open" ให้ไปที่ **System Settings > Privacy & Security** เลื่อนลงจะเห็นข้อความว่าแอปถูกบล็อก แล้วกด **"Open Anyway"**
            4. ครั้งต่อไปสามารถดับเบิลคลิกเปิดได้ปกติ
            5. แอปจะเปิดเป็นหน้าต่างโปรแกรมโดยอัตโนมัติ (ไม่ต้องเปิดเบราว์เซอร์)

            #### Windows
            1. ดาวน์โหลดไฟล์ ZIP
            2. แตกไฟล์ ZIP (คลิกขวา > Extract All)
            3. ดับเบิลคลิก `SET-Financial-Analyzer.exe`
               - หาก SmartScreen แจ้งเตือน: กด "More info" > "Run anyway"
            4. แอปจะเปิดเป็นหน้าต่างโปรแกรมโดยอัตโนมัติ (ไม่ต้องเปิดเบราว์เซอร์)
          draft: false
          prerelease: false
          files: |
            artifacts/SET-Financial-Analyzer-macOS-arm64/SET-Financial-Analyzer-macOS-arm64.zip
            artifacts/SET-Financial-Analyzer-macOS-x64/SET-Financial-Analyzer-macOS-x64.zip
            artifacts/SET-Financial-Analyzer-Windows-x64/SET-Financial-Analyzer-Windows-x64.zip
